<!DOCTYPE html>
<html>
<head>
    <title>Lab 2</title>
</head>
<body>

<label>Date of first Sunday: </label>
<input type="number" id="firstSun" min=1 max=7 placeholder="e.g., 5">

<label>Days: </label>
<input type="number" id="days" min=28 max=31 placeholder="e.g., 30">

<button type="button" onclick="genCal()">Generate Calendar</button><br>

    <div class="row" >
        <div class="col-md-6 col-md-offset-3" id="dynamicCalendar">
        </div>
    </div>
</body>

<script>
    function genCal() {
        var firstSun = document.getElementById("firstSun").value;
        var days = document.getElementById("days").value
        var dynamicC = document.getElementById("dynamicCalendar");
        
        var str = "<table class='table table-striped table-bordered table-hover'><tr>";
        
        if (firstSun == 1) firstSun = 8;

        for (var i = firstSun; i<=7; i++)
        str = str + "<td></td>";
        
        for (i = 1; i <= days; i++)
        str = str + "<td>" + i + </td>;
        
        for (var i = 1; i <= days; i++) {
            if ( (i - firstSun) % 7 == 0) str = str + "</tr><tr>";
            
            str = str + "<td>" + i + "</td>";
        }
        str = str + "</tr></table>"

        dynamicC.innerHTML = str;
        
        
    }
</script>
</html>
